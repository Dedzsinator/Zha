<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Zha rendszer teljes architektúrája - Párhuzamos három modell kombináció</text>

  <!-- Input -->
  <rect x="50" y="80" width="120" height="60" fill="#e1f5fe" stroke="#01579b" stroke-width="2" rx="10"/>
  <text x="110" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Bemeneti</text>
  <text x="110" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MIDI fájl</text>

  <!-- Arrow to Preprocessing -->
  <line x1="170" y1="110" x2="200" y2="110" stroke="#01579b" stroke-width="2"/>
  <polygon points="200,110 190,105 190,115" fill="#01579b"/>

  <!-- Preprocessing -->
  <rect x="200" y="80" width="120" height="60" fill="#f3e5f5" stroke="#4a148c" stroke-width="2" rx="10"/>
  <text x="260" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Előfeldolgozás</text>
  <text x="260" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">128-dimenzios</text>
  <text x="260" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">feature vektor</text>

  <!-- Arrow to Split -->
  <line x1="320" y1="110" x2="365" y2="110" stroke="#4a148c" stroke-width="2"/>
  <polygon points="365,110 355,105 355,115" fill="#4a148c"/>

  <!-- Split point -->
  <circle cx="380" cy="170" r="15" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="380" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Split</text>

  <!-- Arrow from preprocessing down to split -->
  <line x1="260" y1="140" x2="260" y2="170" stroke="#4a148c" stroke-width="2"/>
  <line x1="260" y1="170" x2="365" y2="170" stroke="#4a148c" stroke-width="2"/>
  <polygon points="365,170 355,165 355,175" fill="#4a148c"/>

  <!-- Arrows from Split to models -->
  <line x1="395" y1="170" x2="415" y2="170" stroke="#e65100" stroke-width="2"/>
  <line x1="415" y1="170" x2="415" y2="90" stroke="#e65100" stroke-width="2"/>
  <line x1="415" y1="90" x2="430" y2="90" stroke="#e65100" stroke-width="2"/>
  <polygon points="430,90 420,85 420,95" fill="#e65100"/>

  <line x1="395" y1="170" x2="430" y2="170" stroke="#e65100" stroke-width="2"/>
  <polygon points="430,170 420,165 420,175" fill="#e65100"/>

  <line x1="395" y1="170" x2="415" y2="170" stroke="#e65100" stroke-width="2"/>
  <line x1="415" y1="170" x2="415" y2="250" stroke="#e65100" stroke-width="2"/>
  <line x1="415" y1="250" x2="430" y2="250" stroke="#e65100" stroke-width="2"/>
  <polygon points="430,250 420,245 420,255" fill="#e65100"/>

  <!-- Markov Chain -->
  <rect x="430" y="60" width="120" height="60" fill="#e8f5e8" stroke="#2e7d32" stroke-width="2" rx="10"/>
  <text x="490" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Markov-lánc</text>
  <text x="490" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Akkord progresszió</text>
  <text x="490" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">+ bázis szekvencia</text>

  <!-- VAE -->
  <rect x="430" y="140" width="120" height="60" fill="#fff3e0" stroke="#e65100" stroke-width="2" rx="10"/>
  <text x="490" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">VAE</text>
  <text x="490" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Encode → Sample</text>
  <text x="490" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">→ Decode</text>

  <!-- Transformer -->
  <rect x="430" y="220" width="120" height="60" fill="#fce4ec" stroke="#880e4f" stroke-width="2" rx="10"/>
  <text x="490" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Transformer</text>
  <text x="490" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Koherens</text>
  <text x="490" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">szekvencia</text>

  <!-- Arrows from models to Combination -->
  <line x1="550" y1="90" x2="570" y2="90" stroke="#2e7d32" stroke-width="2"/>
  <line x1="570" y1="90" x2="570" y2="180" stroke="#2e7d32" stroke-width="2"/>
  <line x1="570" y1="180" x2="580" y2="180" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="580,180 570,175 570,185" fill="#2e7d32"/>

  <line x1="550" y1="170" x2="580" y2="170" stroke="#e65100" stroke-width="2"/>
  <polygon points="580,170 570,165 570,175" fill="#e65100"/>

  <line x1="550" y1="250" x2="570" y2="250" stroke="#880e4f" stroke-width="2"/>
  <line x1="570" y1="250" x2="570" y2="190" stroke="#880e4f" stroke-width="2"/>
  <line x1="570" y1="190" x2="580" y2="190" stroke="#880e4f" stroke-width="2"/>
  <polygon points="580,190 570,185 570,195" fill="#880e4f"/>

  <!-- Combination -->
  <rect x="580" y="130" width="120" height="110" fill="#f1f8e9" stroke="#33691e" stroke-width="2" rx="10"/>
  <text x="640" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Kombináció</text>
  <text x="640" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Súlyozott átlag</text>
  <text x="640" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">0.5*Markov</text>
  <text x="640" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">+ VAE (szűrve)</text>
  <text x="640" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">+ Transformer</text>
  <text x="640" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">(szűrve)</text>

  <!-- Arrow to Output -->
  <line x1="700" y1="185" x2="730" y2="185" stroke="#33691e" stroke-width="2"/>
  <polygon points="730,185 720,180 720,190" fill="#33691e"/>

  <!-- Output -->
  <rect x="730" y="155" width="120" height="60" fill="#e1f5fe" stroke="#01579b" stroke-width="2" rx="10"/>
  <text x="790" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Generált</text>
  <text x="790" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MIDI fájl</text>

  <!-- Key Analysis -->
  <rect x="50" y="200" width="120" height="50" fill="#e0f2f1" stroke="#00695c" stroke-width="2" rx="10"/>
  <text x="110" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Hangnem és skála</text>
  <text x="110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">detektálás</text>

  <!-- Arrow from preprocessing to key analysis -->
  <line x1="230" y1="140" x2="230" y2="160" stroke="#4a148c" stroke-width="2"/>
  <line x1="230" y1="160" x2="110" y2="160" stroke="#4a148c" stroke-width="2"/>
  <line x1="110" y1="160" x2="110" y2="200" stroke="#4a148c" stroke-width="2"/>
  <polygon points="110,200 105,190 115,190" fill="#4a148c"/>

  <!-- Arrow from key analysis to Markov (dashed) -->
  <line x1="170" y1="225" x2="350" y2="225" stroke="#00695c" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="350" y1="225" x2="350" y2="90" stroke="#00695c" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="350" y1="90" x2="430" y2="90" stroke="#00695c" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="430,90 420,85 420,95" fill="#00695c"/>

  <!-- Flow explanation -->
  <text x="450" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Adatfolyam: MIDI → Feature vektor → Párhuzamos feldolgozás (Markov, VAE, Transformer) → Kombináció → MIDI</text>

  <!-- Model roles legend -->
  <text x="100" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Modell szerepek:</text>
  <rect x="100" y="390" width="15" height="15" fill="#e8f5e8" stroke="#2e7d32" stroke-width="1"/>
  <text x="120" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">Markov: Harmonikus struktúra (akkord progresszió)</text>
  
  <rect x="100" y="410" width="15" height="15" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="120" y="421" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#e65100">VAE: Kreatív variáció (latent sampling)</text>
  
  <rect x="100" y="430" width="15" height="15" fill="#fce4ec" stroke="#880e4f" stroke-width="1"/>
  <text x="120" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#880e4f">Transformer: Koherens szekvencia (long-range dependencies)</text>

  <rect x="450" y="390" width="15" height="15" fill="#e0f2f1" stroke="#00695c" stroke-width="1"/>
  <text x="470" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#00695c">Hangnem detektálás: Skála szerinti szűrés</text>
  
  <rect x="450" y="410" width="15" height="15" fill="#f1f8e9" stroke="#33691e" stroke-width="1"/>
  <text x="470" y="421" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#33691e">Kombináció: 0.5×Markov + szűrt VAE + szűrt Transformer</text>
</svg>